aid: friend-com
url: https://raw.githubusercontent.com/api-evangelist/friend-com/refs/heads/main/apis.yml
name: Friend
kind: company
description: >-
  Friend is an AI companion pendant — a sub-two-inch wearable with a
  microphone that pairs with a phone app and communicates back to the user via
  text messages rather than speech. Originally announced at $99, the product
  shipped (after delays) in 2025 at $129 in North America. Friend is a
  consumer hardware company with no public developer API, SDK, or partner
  program; only the consumer site, an app, and the Wikipedia / press coverage
  exist as references.
